name: C++ Build & Test

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install g++
      run: sudo apt-get update && sudo apt-get install -y g++

    - name: Debug files
      run: ls -R

    - name: Compilation
      run: |
        find . -name "*.cpp"
        g++ $(find . -name "*.cpp") -o app

    - name: Run
      run: ./app